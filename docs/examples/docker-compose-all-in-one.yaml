# Docker Compose - All-in-One Setup
# Alle drei Services (alarm-mail, alarm-monitor, alarm-messenger) zusammen
#
# Verwendung:
#   1. Kopieren Sie diese Datei in Ihr Projekt-Root-Verzeichnis
#   2. Erstellen Sie .env Dateien für jeden Service
#   3. Passen Sie die Pfade in den build-Direktiven an
#   4. Starten: docker compose -f docker-compose-all-in-one.yaml up -d

version: '3.8'

services:
  # =============================================================================
  # alarm-mail Service
  # Ruft E-Mails ab und verteilt sie an die anderen Services
  # =============================================================================
  alarm-mail:
    build: ./alarm-mail
    container_name: alarm-mail
    restart: unless-stopped
    environment:
      # IMAP Konfiguration (aus Umgebungsvariablen)
      - ALARM_MAIL_IMAP_HOST=${IMAP_HOST}
      - ALARM_MAIL_IMAP_PORT=${IMAP_PORT:-993}
      - ALARM_MAIL_IMAP_USE_SSL=${IMAP_USE_SSL:-true}
      - ALARM_MAIL_IMAP_USERNAME=${IMAP_USERNAME}
      - ALARM_MAIL_IMAP_PASSWORD=${IMAP_PASSWORD}
      - ALARM_MAIL_IMAP_MAILBOX=${IMAP_MAILBOX:-INBOX}
      - ALARM_MAIL_IMAP_SEARCH=${IMAP_SEARCH:-UNSEEN}
      - ALARM_MAIL_POLL_INTERVAL=${POLL_INTERVAL:-60}
      # Target-Konfiguration (interne Docker-URLs)
      - ALARM_MAIL_ALARM_MONITOR_URL=http://alarm-monitor:8000
      - ALARM_MAIL_ALARM_MONITOR_API_KEY=${API_KEY_SHARED}
      - ALARM_MAIL_ALARM_MESSENGER_URL=http://alarm-messenger:3000
      - ALARM_MAIL_ALARM_MESSENGER_API_KEY=${API_KEY_SHARED}
      # Timezone
      - TZ=Europe/Berlin
    depends_on:
      - alarm-monitor
      - alarm-messenger
    networks:
      - alarm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # alarm-monitor Service
  # Web-Dashboard für Einsatzanzeige
  # =============================================================================
  alarm-monitor:
    build: ./alarm-monitor
    container_name: alarm-monitor
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ALARM_DASHBOARD_API_KEY=${API_KEY_SHARED}
      - TZ=Europe/Berlin
    volumes:
      - monitor-data:/app/data
    networks:
      - alarm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # alarm-messenger Service
  # Mobile Alarmierung mit Push-Benachrichtigungen
  # =============================================================================
  alarm-messenger:
    build: ./alarm-messenger/server
    container_name: alarm-messenger
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - API_SECRET_KEY=${API_KEY_SHARED}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/messenger
      - NODE_ENV=production
      - TZ=Europe/Berlin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alarm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # PostgreSQL Datenbank
  # Für alarm-messenger
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: alarm-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=messenger
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - alarm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Optional: Reverse Proxy (nginx)
  # Für HTTPS und externe Zugriffe
  # Kommentieren Sie diesen Block aus, wenn nicht benötigt
  # =============================================================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: alarm-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - alarm-monitor
  #     - alarm-messenger
  #   networks:
  #     - alarm-network
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

# =============================================================================
# Volumes
# Persistente Datenspeicherung
# =============================================================================
volumes:
  monitor-data:
    name: alarm-monitor-data
  postgres-data:
    name: alarm-postgres-data

# =============================================================================
# Networks
# Isoliertes Netzwerk für alle Services
# =============================================================================
networks:
  alarm-network:
    name: alarm-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================================
# Hinweise:
# 
# 1. .env Datei erstellen:
#    Erstellen Sie eine .env Datei im gleichen Verzeichnis mit:
#    
#    # IMAP Zugangsdaten
#    IMAP_HOST=imap.mailserver.de
#    IMAP_USERNAME=alarm@feuerwehr.de
#    IMAP_PASSWORD=geheimes-passwort
#    
#    # Gemeinsamer API-Key für alle Services
#    API_KEY_SHARED=ihr-sehr-geheimer-api-key-mindestens-32-zeichen-lang
#    
#    # PostgreSQL Passwort
#    POSTGRES_PASSWORD=sicheres-postgres-passwort
#
# 2. Verzeichnisstruktur:
#    feuerwehr-alarm/
#    ├── alarm-mail/          (dieses Repository)
#    ├── alarm-monitor/       (Dashboard Repository)
#    ├── alarm-messenger/     (Messenger Repository)
#    ├── docker-compose-all-in-one.yaml (diese Datei)
#    └── .env
#
# 3. Services starten:
#    docker compose -f docker-compose-all-in-one.yaml up -d
#
# 4. Logs anzeigen:
#    docker compose -f docker-compose-all-in-one.yaml logs -f
#
# 5. Services stoppen:
#    docker compose -f docker-compose-all-in-one.yaml down
#
# 6. Zugriff:
#    - alarm-monitor: http://localhost:8000
#    - alarm-messenger: http://localhost:3000
#    - alarm-mail: (kein Web-UI, nur API auf Port 8000)
#
# =============================================================================
